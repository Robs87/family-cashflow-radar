name: Bug Report
description: 提交一个 Bug 报告
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提交 Bug 报告！请尽量填写以下信息，帮助我们快速定位问题。

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 清晰描述你遇到的问题
      placeholder: 描述 Bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 如何触发该 Bug
      placeholder: |
        1. 执行 '...'
        2. 点击 '...'
        3. 看到错误 '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望的正确行为是什么
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 你的运行环境
      placeholder: |
        - OS: [e.g. macOS 14, Ubuntu 22.04]
        - Python: [e.g. 3.11]
        - SQLite: [e.g. 3.45]
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 日志输出
      description: 相关的错误日志（请移除敏感信息）
      render: shell
    validations:
      required: false
